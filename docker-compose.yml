services:
  web:
    build: .
    container_name: pb-web
    ports:
      - "8085:80"
    volumes:
      - ./src:/var/www/html
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - pbnet

  db:
    image: mysql:8.0
    container_name: pb-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: peopleblue
      MYSQL_USER: peopleblue_user
      MYSQL_PASSWORD: peopleblue_pass
    volumes:
      - pb_data:/var/lib/mysql
      - ./src/sql:/docker-entrypoint-initdb.d
    networks:
      - pbnet

  adminer:
    image: adminer:4
    container_name: pb-adminer
    ports:
      - "8086:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - pbnet

volumes:
  pb_data:

networks:
  pbnet:
